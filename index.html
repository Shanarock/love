<!DOCTYPE html>
<html lang="en">
<head>

    <title>A Special Message</title>
    <link rel="stylesheet" href="style.css">

<body>

    <div class="container">
        <div id="card-wrapper" class="card-wrapper">

            <div class="card" id="main-card">
                <div class="card-content">
                    <h3>Dear hans ,</h3>
                    <p>I just want to tell you , that you got this my love. 
                    Even far from you , i am close to you in your heart. 
                    I send you lots of hugs , loves , kisses , and good luck for your work and exams. 
                    I love you , i miss you a lot my babe. </p>
                <button id="next-btn">Click here for one more thing...</button>
                </div>
            </div>

        <div id="final-surprise" class="hidden">

                <img src="https://media3.giphy.com/media/v1.Y2lkPTc5MGI3NjExN2EyeXIzZmo2MmVjdjJyaWV0Z2FscTkyNzMwczBvaWxwdzU5OG5lYiZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/16OzPTMlBMiH6Yze1n/giphy.gif" alt="love"
